<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planogramas por metro de góndola</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #1f2937;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
      color: #0f172a;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
    }
    .links {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }
    .link {
      display: block;
      padding: 16px 18px;
      background: #eef4ff;
      border-radius: 10px;
      text-decoration: none;
      color: #0b57d0;
      font-weight: bold;
      transition: 0.2s;
    }
    .link:hover {
      background: #dbe8ff;
    }
    .small {
      margin-top: 22px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Planogramas por metro de góndola</h1>
      <p>
        En esta página están disponibles los planogramas correspondientes a cada metro de góndola.
        Selecciona el documento que quieras revisar.
      </p>

      <div class="links">
        <a class="link" href="https://jmleighton.github.io/QR-Planogramas/Arroz-M1.pdf" target="_blank">Arroz M1</a>
        <a class="link" href="Arroz M2.pdf" target="_blank">Arroz M2</a>
        <a class="link" href="Arroz M3.pdf" target="_blank">Arroz M3</a>
        <a class="link" href="Arroz M4.pdf" target="_blank">Arroz M3</a>
      </div>

      <div class="small">
        Actualiza estos enlaces según los nombres reales de tus archivos PDF.
      </div>
    </div>
  </div>
</body>
</html>
